name: InforMessi - Scraper de Noticias Diario

on:
  schedule:
    - cron: '0 7 * * *'  # 4:00 AM Argentina (UTC-3)
  workflow_dispatch:  # Permitir ejecución manual

# Necesario para que `git push` al mismo repo funcione con GITHUB_TOKEN
permissions:
  contents: write

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 feedparser praw

      - name: Scrapear noticias del día
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "Scrapeando noticias para $DATE"
          python3 scripts/scrape-daily-news.py --date "$DATE"

      - name: Commit y push noticias
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/daily-news/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios en data/daily-news, no hay commit"
            exit 0
          fi
          git commit -m "📰 Noticias $(date -u +%Y-%m-%d)"
          git push origin "HEAD:${BRANCH}"
