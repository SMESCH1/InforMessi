name: InforMessi - Flujo Diario

on:
  schedule:
    - cron: '15 13 * * *' # 10:15 AM Argentina (UTC-3)
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Verificar que no haya archivos de entorno en el repo
        run: |
          TRACKED=$(git ls-files .env .env.example .env.local 2>/dev/null || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::No se deben subir archivos de entorno al repo (contienen secretos). Estan trackeados: $TRACKED"
            echo "Quitalos con: git rm --cached .env .env.example .env.local"
            exit 1
          fi

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar informe si no existe
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.1-8b-instant
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ ! -f "reports/${DATE}.json" ]; then
            echo "Generando informe para ${DATE}..."
            python3 scripts/generate-advance-reports.py --days 1 --start-date "${DATE}"
          else
            echo "Informe para ${DATE} ya existe"
          fi

      - name: Actualizar informe con noticias recientes
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.1-8b-instant
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PREVIEW_CHAT_ID: ${{ secrets.TELEGRAM_PREVIEW_CHAT_ID }}
          TELEGRAM_PUBLIC_CHAT_ID: ${{ secrets.TELEGRAM_PUBLIC_CHAT_ID }}
        run: python3 scripts/update-today-report.py

      - name: Enviar a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PREVIEW_CHAT_ID: ${{ secrets.TELEGRAM_PREVIEW_CHAT_ID }}
          TELEGRAM_PUBLIC_CHAT_ID: ${{ secrets.TELEGRAM_PUBLIC_CHAT_ID }}
        run: python3 scripts/send-daily-report-review.py

      - name: Publicacion automatica de respaldo
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PUBLIC_CHAT_ID: ${{ secrets.TELEGRAM_PUBLIC_CHAT_ID }}
        run: python3 scripts/auto-publish-fallback.py --check-all --hours 2 || true

      - name: Commit y push cambios
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/ data/ || true
          git diff --staged --quiet || git commit -m "Actualizar informe $(date +%Y-%m-%d)"
          # Si el push falla, el job falla: el siguiente run no tendrá reports/data actualizados (memoria desactualizada)
          git push
