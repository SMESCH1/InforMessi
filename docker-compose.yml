# docker-compose.yml para InforMessi
version: '3.8'

services:
  informessi:
    build: .
    container_name: informessi
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
      - ./prompts:/app/prompts:ro
      - ./.env:/app/.env:ro
      - ./scripts:/app/scripts:ro
      - informessi-tmp:/tmp/informessi
    environment:
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - informessi-network
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - informessi-network

  heartbeat-server:
    build:
      context: .
      dockerfile: Dockerfile.heartbeat
    container_name: heartbeat-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - heartbeat-data:/app/data
    networks:
      - informessi-network

volumes:
  ollama-data:
  informessi-tmp:
  heartbeat-data:

networks:
  informessi-network:
    driver: bridge

